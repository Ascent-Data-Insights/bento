services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: routing
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: routing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing -d routing"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ROUTING_SOLVER_NAME=cbc
      - ROUTING_SOLVER_TIME_LIMIT=300
      - ROUTING_LOG_LEVEL=INFO
      - ROUTING_DATABASE_URL=postgresql://routing:routing@postgres:5432/routing
      - ROUTING_OSRM_BASE_URL=https://router.project-osrm.org
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
